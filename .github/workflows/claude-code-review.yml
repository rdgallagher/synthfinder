name: Claude Code Review

# Auto-review every PR. This is the agent loop's review step: findings land as
# PR comments, which a human (or @claude follow-ups) then drive to resolution.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request against the conventions in CLAUDE.md and the
            acceptance criteria of the issue it closes.

            Focus on: correctness, missing or weak test coverage, adherence to the
            project's TDD and simplicity practices, and whether every acceptance
            criterion is actually met. Leave specific, actionable inline comments.
            If the PR looks good, say so concisely.
          claude_args: |
            --max-turns 20
