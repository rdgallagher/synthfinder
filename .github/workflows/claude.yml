name: Claude Agent

# Label-driven dispatch: add the `agent-ready` label to an issue and Claude
# picks it up, implements it to its acceptance criteria, and opens a PR.
on:
  issues:
    types: [labeled]

jobs:
  agent:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            Implement the work described in issue #${{ github.event.issue.number }}.

            Follow the conventions in CLAUDE.md, including test-driven development:
            write a failing test first, make it pass, then refactor.

            Satisfy every item in the issue's "Acceptance Criteria" checklist. Treat
            the issue as done only when all acceptance criteria are met and the full
            test suite, lint, and type-check pass locally.

            When finished, open a pull request that closes issue
            #${{ github.event.issue.number }} and explains how each acceptance
            criterion was satisfied. Do not merge it.
          claude_args: |
            --max-turns 40
