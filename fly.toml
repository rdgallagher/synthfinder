# Generated by `fly launch` — update `app` to match your Fly.io app name.
# Run `fly launch` once interactively to provision the app, then use
# `fly deploy` (or let GitHub Actions deploy) for subsequent updates.

app = 'synthfinder'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = 'production'
  NEXT_TELEMETRY_DISABLED = '1'
  MARKETPLACE = 'reverb'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
